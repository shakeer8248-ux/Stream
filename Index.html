<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie Collection</title>
    <style>
        body { 
            background-color: #111; color: white; font-family: Arial, sans-serif; 
            margin: 0; padding: 20px; text-align: center; 
        }
        h1 { margin-bottom: 30px; color: #f1f1f1; }

        /* Gallery Grid */
        #gallery { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; 
        }
        .card { 
            background-color: #222; border: 2px solid #333; border-radius: 8px; 
            width: 180px; padding: 20px 10px; cursor: pointer; transition: 0.3s;
        }
        /* The focus state makes it work with TV remote D-Pads */
        .card:hover, .card:focus { 
            border-color: #007bff; background-color: #333; outline: none; transform: scale(1.05);
        }
        .icon { font-size: 40px; margin-bottom: 10px; }
        .title { font-size: 16px; font-weight: bold; }

        /* Fullscreen Player Overlay */
        #player-container { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background-color: black; z-index: 1000; 
        }
        #close-btn { 
            position: absolute; top: 15px; left: 15px; z-index: 1001; 
            background-color: rgba(50, 50, 50, 0.8); color: white; 
            border: 2px solid white; padding: 10px 20px; font-size: 16px; 
            cursor: pointer; border-radius: 5px;
        }
        #close-btn:focus { border-color: #007bff; outline: none; background-color: #007bff; }
        iframe { 
            width: 100%; height: 100%; border: none; 
        }
    </style>
</head>
<body>

    <h1>My Movie Collection</h1>
    <div id="gallery"></div>

    <div id="player-container">
        <button id="close-btn" onclick="closeMovie()">Exit Movie</button>
        <iframe id="video-frame" allowfullscreen="true"></iframe>
    </div>

    <script>
        // ADD YOUR 10 MOVIES HERE
        // Replace "ID_HERE" with the actual ID from your Google Drive links
        var myMovies = [
            { title: "Soorarai Pottru 2020", id: "1JxG9gDuumNOFFMf0-fSZAp8jpkknoBrH" },
            { title: "Sambavam_Adhyayam_Onnu_2026", id: "17tCQAE6eeFs7esRpV-ul9lRujsg4bQfE" },
            { title: "Movie 3", id: "ID_HERE_3" },
            { title: "Movie 4", id: "ID_HERE_4" },
            { title: "Movie 5", id: "ID_HERE_5" },
            { title: "Movie 6", id: "ID_HERE_6" },
            { title: "Movie 7", id: "ID_HERE_7" },
            { title: "Movie 8", id: "ID_HERE_8" },
            { title: "Movie 9", id: "ID_HERE_9" },
            { title: "Movie 10", id: "ID_HERE_10" }
        ];

        var galleryDiv = document.getElementById("gallery");

        // Loop to create the movie cards (Written in old JS for Android 5)
        for (var i = 0; i < myMovies.length; i++) {
            var card = document.createElement("div");
            card.className = "card";
            card.tabIndex = 0; // Makes it clickable with a TV remote
            
            card.innerHTML = '<div class="icon">🍿</div><div class="title">' + myMovies[i].title + '</div>';
            
            // Attach the click event
            card.onclick = createPlayFunction(myMovies[i].id);
            // Allow clicking with the "OK" button on a TV remote
            card.onkeypress = createKeyPressFunction(myMovies[i].id);
            
            galleryDiv.appendChild(card);
        }

        // Helper functions to handle TV clicks
        function createPlayFunction(videoId) {
            return function() {
                var iframe = document.getElementById("video-frame");
                // Uses the Google Drive preview player for high quality streaming
                iframe.src = "https://drive.google.com/file/d/" + videoId + "/preview";
                document.getElementById("player-container").style.display = "block";
            };
        }

        function createKeyPressFunction(videoId) {
            return function(event) {
                if (event.keyCode === 13) { // 13 is the "Enter/OK" key on remotes
                    createPlayFunction(videoId)();
                }
            };
        }

        function closeMovie() {
            document.getElementById("video-frame").src = ""; // Stop the video
            document.getElementById("player-container").style.display = "none";
        }
    </script>

</body>
</html>
