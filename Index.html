<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Cloud Cinema</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root { --bg: #0a0a0a; --card: #1a1a1a; --accent: #ff3e3e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .upload-btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; }

        /* Gallery Grid */
        #gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; margin-top: 20px; 
        }
        .movie-card { background: var(--card); border-radius: 10px; overflow: hidden; text-align: center; border: 1px solid #333; }
        .movie-card:focus { border: 3px solid white; outline: none; } /* Better for TV Remote */
        .thumb { height: 100px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .title { padding: 10px; font-size: 13px; font-weight: bold; }

        /* Player Overlay */
        #player-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        video { width: 100%; height: 100%; }
        .back-btn { position: absolute; top: 10px; left: 10px; z-index: 1001; background: rgba(0,0,0,0.6); color: white; border: 1px solid #fff; padding: 8px; }

        /* Simple Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 500; flex-direction: column; align-items: center; justify-content: center; }
        input { width: 80%; padding: 12px; margin: 5px; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

    <header>
        <h3>Cloud Movies</h3>
        <button class="upload-btn" onclick="showModal(true)">+ ADD</button>
    </header>

    <div id="gallery">Loading movies...</div>

    <div id="modal">
        <h3>Add Movie</h3>
        <input type="text" id="mName" placeholder="Movie Title">
        <input type="text" id="mUrl" placeholder="Google Drive Link">
        <button class="upload-btn" style="width:80%; margin-top:10px;" onclick="uploadToFirebase()">Save to Cloud</button>
        <button onclick="showModal(false)" style="background:none; color:gray; border:none; margin-top:10px;">Close</button>
    </div>

    <div id="player-layer">
        <button class="back-btn" onclick="closeVideo()">← Back to Gallery</button>
        <video id="tvPlayer" controls autoplay></video>
    </div>

    <script>
        // 1. YOUR FIREBASE CONFIG GOES HERE
        const firebaseConfig = {
  apiKey: "AIzaSyBLVk6QVQXJJCnOICUw0nyUqwiL_jgY9M4",
  authDomain: "tv08-264a1.firebaseapp.com",
  databaseURL: "https://tv08-264a1-default-rtdb.firebaseio.com",
  projectId: "tv08-264a1",
  storageBucket: "tv08-264a1.firebasestorage.app",
  messagingSenderId: "616916584219",
  appId: "1:616916584219:web:3d13ab8b1577016882b5be"
};

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. Upload Function
        function uploadToFirebase() {
            const name = document.getElementById('mName').value;
            const rawUrl = document.getElementById('mUrl').value;
            const fileIdMatch = rawUrl.match(/\/d\/(.+?)\//);

            if (name && fileIdMatch) {
                const streamUrl = "https://drive.google.com/uc?export=download&id=" + fileIdMatch[1];
                db.collection("movies").add({
                    title: name,
                    url: streamUrl,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    showModal(false);
                    document.getElementById('mName').value = '';
                    document.getElementById('mUrl').value = '';
                });
            } else {
                alert("Check your link and name!");
            }
        }

        // 3. Real-time Gallery Sync
        db.collection("movies").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            snapshot.forEach((doc) => {
                const movie = doc.data();
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.tabIndex = 0; // Makes it focusable for TV remotes
                card.onclick = () => playMovie(movie.url);
                card.innerHTML = `
                    <div class="thumb">🎬</div>
                    <div class="title">${movie.title}</div>
                `;
                gallery.appendChild(card);
            });
            if(snapshot.empty) gallery.innerHTML = "No movies added yet.";
        });

        // 4. Video Player Controls
        function playMovie(url) {
            const v = document.getElementById('tvPlayer');
            v.src = url;
            document.getElementById('player-layer').style.display = 'block';
        }

        function closeVideo() {
            const v = document.getElementById('tvPlayer');
            v.pause();
            v.src = "";
            document.getElementById('player-layer').style.display = 'none';
        }

        function showModal(status) {
            document.getElementById('modal').style.display = status ? 'flex' : 'none';
        }
    </script>
</body>
</html>
