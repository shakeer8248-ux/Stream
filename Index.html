<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV Cloud Cinema</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* Top Header & Button */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .upload-btn { background: #e50914; color: #fff; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Movie Gallery */
        #gallery { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .card { background: #1a1a1a; width: 140px; padding: 10px; text-align: center; border-radius: 8px; border: 2px solid #1a1a1a; cursor: pointer; transition: 0.2s; }
        .card:focus, .card:hover { border-color: #e50914; outline: none; } /* Focus helps TV remotes */
        .thumb { height: 90px; background: #000; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px;}
        .title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Modal & Player Overlays */
        #modal, #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; }
        
        #modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 30px; border-radius: 10px; width: 80%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #333; color: white; border: 1px solid #555; }
        
        /* Google Drive Iframe Player */
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 10px 15px; border: 1px solid white; z-index: 101; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>My Movies</h2>
        <button class="upload-btn" onclick="openModal()">+ UPLOAD</button>
    </div>

    <div id="gallery">Loading movies...</div>

    <div id="modal">
        <div id="modal-content">
            <h3>Add to Web Gallery</h3>
            <input type="text" id="mName" placeholder="Movie Name">
            <input type="text" id="mUrl" placeholder="Paste Google Drive Link here">
            <button class="upload-btn" style="width: 100%;" onclick="saveToFirebase()">Save Link</button>
            <button style="background: none; color: gray; border: none; margin-top: 15px; width: 100%;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <div id="player">
        <button class="close-btn" onclick="closePlayer()">← Back to Gallery</button>
        <iframe id="iframePlayer" allowfullscreen="true"></iframe>
    </div>

    <script>
        // 1. FIREBASE CONFIG (Paste your keys here)
        var firebaseConfig = {
  apiKey: "AIzaSyBLVk6QVQXJJCnOICUw0nyUqwiL_jgY9M4",
  authDomain: "tv08-264a1.firebaseapp.com",
  databaseURL: "https://tv08-264a1-default-rtdb.firebaseio.com",
  projectId: "tv08-264a1",
  storageBucket: "tv08-264a1.firebasestorage.app",
  messagingSenderId: "616916584219",
  appId: "1:616916584219:web:3d13ab8b1577016882b5be"
};
        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();

        // 2. OPEN / CLOSE WINDOWS
        function openModal() { document.getElementById('modal').style.display = 'block'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function closePlayer() { 
            document.getElementById('iframePlayer').src = ""; 
            document.getElementById('player').style.display = 'none'; 
        }

        // 3. SEND LINK TO FIREBASE (Written for Android 5 compatibility)
        function saveToFirebase() {
            var name = document.getElementById('mName').value;
            var rawUrl = document.getElementById('mUrl').value;
            
            // This grabs the ID out of the Google Drive link
            var match = rawUrl.match(/\/d\/(.+?)\//);

            if (name && match && match[1]) {
                // Creates a Google Drive Embed Player link
                var embedUrl = "https://drive.google.com/file/d/" + match[1] + "/preview";
                
                db.collection("movies").add({
                    title: name,
                    url: embedUrl,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).then(function() {
                    document.getElementById('mName').value = '';
                    document.getElementById('mUrl').value = '';
                    closeModal();
                }).catch(function(error) {
                    alert("Database Error: " + error.message);
                });
            } else {
                alert("Please make sure it is a valid Google Drive link!");
            }
        }

        // 4. LOAD GALLERY FROM FIREBASE IN REAL-TIME
        db.collection("movies").orderBy("timestamp", "desc").onSnapshot(function(snapshot) {
            var gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            if (snapshot.empty) {
                gallery.innerHTML = '<p style="color: gray;">No movies yet. Click + UPLOAD to add one.</p>';
                return;
            }

            // Build the cards
            snapshot.forEach(function(doc) {
                var movie = doc.data();
                var card = document.createElement('div');
                card.className = 'card';
                card.tabIndex = 0; // Allows TV remote to select it
                
                // When card is clicked, open the iframe player
                card.onclick = function() {
                    document.getElementById('iframePlayer').src = movie.url;
                    document.getElementById('player').style.display = 'block';
                };

                card.innerHTML = '<div class="thumb">🎬</div><div class="title">' + movie.title + '</div>';
                gallery.appendChild(card);
            });
        });
    </script>
</body>
</html>
